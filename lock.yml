name: Lock Threads

on:
  schedule:
    - cron: '0 2 * * 0' # Runs every Sunday at 02:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    name: Lock inactive closed threads
    runs-on: ubuntu-latest
    steps:
      - name: Lock closed issues and PRs
        uses: dessant/lock-threads@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          # ── Issues ───────────────────────────────────────────────
          # Lock closed issues after 60 days of inactivity
          issue-inactive-days: '60'
          issue-lock-reason: 'resolved'
          issue-comment: >
            This issue has been closed for 60 days and is now locked.
            If you are experiencing a similar problem, please open a new
            issue and reference this one.

          # ── Pull Requests ─────────────────────────────────────────
          # Lock merged/closed PRs after 90 days of inactivity
          pr-inactive-days: '90'
          pr-lock-reason: 'resolved'
          pr-comment: ''    # no comment on locked PRs

          # ── Filters ───────────────────────────────────────────────
          # Never lock issues or PRs with these labels
          exclude-issue-created-before: ''
          exclude-any-issue-labels: 'pinned,security'
          exclude-any-pr-labels: 'pinned'

          log-output: true
