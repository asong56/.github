name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

version-resolver:
  major:
    labels: ['breaking change', 'major']
  minor:
    labels: ['feature', 'enhancement']
  patch:
    labels: ['fix', 'bug', 'patch', 'dependencies', 'chore']
  default: patch

categories:
  - title: '⚠️ Breaking Changes'
    labels: ['breaking change']
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Bug Fixes'
    labels: ['fix', 'bug']
  - title: '📦 Dependencies'
    labels: ['dependencies']
  - title: '🔧 Maintenance'
    labels: ['chore', 'refactor', 'ci']

exclude-labels: ['skip-changelog']

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
