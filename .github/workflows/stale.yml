name: Stale

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  workflow_call:

permissions:
  issues: write
  pull-requests: write


jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # ── Issues ────────────────────────────────────────────────
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: >
            This issue has had no activity for 60 days and has been marked
            stale. It will be closed in 7 days unless there is new activity.
            Remove the `stale` label or leave a comment to keep it open.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this is still
            relevant — please include any new context when doing so.
          close-issue-label: 'closed: stale'

          # ── Pull Requests ──────────────────────────────────────────
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          stale-pr-message: >
            This pull request has been inactive for 30 days and has been
            marked stale. It will be closed in 7 days unless there is new
            activity. Remove the `stale` label or push a new commit to keep
            it open.
          close-pr-message: ''
          close-pr-label: 'closed: stale'

          # ── Filters ───────────────────────────────────────────────
          exempt-issue-labels: 'pinned,security,in progress,needs-info'
          exempt-pr-labels: 'pinned,in progress'
          remove-stale-when-updated: true
          debug-only: false
