name: Greetings

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            👋 Thanks for opening your first issue! Please make sure you've
            read the [contributing guidelines](../blob/main/CONTRIBUTING.md)
            and filled out the template above. We'll get back to you as soon
            as possible.
          pr-message: >
            🎉 Thanks for your first pull request! A maintainer will review it
            shortly. Please make sure all checks pass and the description is
            complete.
