name: Bug Report
description: Something is broken or behaves unexpectedly.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please search [existing issues](../../issues) to avoid duplicates.
        Fill in as much detail as you can — a clear report gets a faster response.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the problem.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Describe the expected behaviour.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The exact sequence that triggers the problem.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in whichever fields are relevant to this project.
      placeholder: |
        - OS and version:
        - Browser / Runtime version:
        - Project version or commit:
        - Architecture (Intel / Apple Silicon / AMD64 / ARM):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste any relevant console output, stack traces, or error messages.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, related issues, or anything else that might help.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have included all information needed to reproduce this issue.
          required: true
