name: Feature Request
description: Propose a new feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please read the README and any philosophy/design documentation to confirm your idea is in scope.
        Open a discussion first if you are unsure — [Discussions → Ideas](../../discussions/new?category=ideas).

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem clearly. A good feature request explains *why*, not just *what*.
      placeholder: "I'm trying to do X, but the current behaviour makes it hard because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you want to happen. Be as specific as you can.
      placeholder: Describe your proposed feature or change.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you thought about? Why do you prefer your proposed solution?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Does this fit within the project's stated scope?
      options:
        - "Yes — it aligns with the project's goals and constraints"
        - "Unsure — I'd like to discuss it"
        - "It extends the current scope, but I believe it's worth considering"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, related issues, or anything else that might help.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and discussions — this has not been proposed before.
          required: true
        - label: I have read the project's philosophy or design documentation.
          required: true
